name: k_gallery
description: >
  A Telegram-style media gallery viewer for Flutter. Supports images, videos,
  and audio with pinch-to-zoom, thumbnail strip, swipe-to-dismiss, and more.
version: 1.0.0
homepage: https://github.com/vishalbaps/kGallery
repository: https://github.com/vishalbaps/kGallery
issue_tracker: https://github.com/vishalbaps/kGallery/issues

topics:
  - gallery
  - media
  - image-viewer
  - video-player

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  freezed_annotation: ^2.4.1
  extended_image: ^8.2.1
  json_annotation: ^4.8.1
  shimmer: ^3.0.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.5
  json_serializable: ^6.7.1
