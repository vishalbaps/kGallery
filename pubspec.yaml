name: k_gallery
description: >
  A Telegram-style media gallery viewer for Flutter. Supports images, videos,
  and audio with pinch-to-zoom, thumbnail strip, swipe-to-dismiss, and more.
version: 1.0.2
homepage: https://github.com/vishalbaps/kGallery
repository: https://github.com/vishalbaps/kGallery.git
issue_tracker: https://github.com/vishalbaps/kGallery/issues

topics:
  - gallery
  - media
  - image-viewer
  - video-player

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  extended_image: ^10.0.1
  json_annotation: ^4.11.0
  shimmer: ^3.0.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  connectivity_plus: ^7.1.1
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
